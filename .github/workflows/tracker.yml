name: Wastewater Discharge Permits Tracker

on:
  schedule:
    # Runs every Sunday at 13:00 UTC (8:00 AM EST)
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows you to manually trigger the script anytime via the GitHub UI

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracking script
        run: python Script

      - name: Commit and push updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lake_james_legislation.csv
          git commit -m "Automated Daily Update: Lake James Wasterwater discharge" || echo "No changes to commit"
          git push origin main
